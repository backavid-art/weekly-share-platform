<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>기사 작성기 | 주간 기사 공유 플랫폼</title>
    <meta name="description" content="소식기사/주보내용 두 입력으로 자동 주간 콘텐츠 생성" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <header class="site-header">
      <div class="site-header-top">
        <div>
          <p class="eyebrow">Writer Tool</p>
          <h1>2-입력 기사 작성기</h1>
          <p class="site-intro">
            입력은 두 가지만 받습니다. <code>소식기사 원문</code> + <code>주보내용 원문</code>을 넣으면
            자동으로 <code>weeks.js</code> 코드가 생성됩니다.
          </p>
        </div>
        <a class="quick-link" href="./index.html">메인 페이지 보기</a>
      </div>
    </header>

    <main class="writer-layout">
      <section class="panel">
        <div class="panel-header">
          <h2>1) 입력 (2개만)</h2>
          <p class="subtle">대충 넣어도 자동 파싱해 최대한 예쁘게 배치합니다.</p>
        </div>

        <div class="writer-grid">
          <label>
            소식기사 원문 (사진경로/URL, 링크, 본문을 함께 붙여넣기)
            <textarea
              id="newsRaw"
              class="article-input"
              placeholder="제목: 4월 넷째 주 교회 소식&#10;대표이미지: ./assets/images/weekly-2026-04-23.jpg&#10;사진: ./assets/images/news-01.jpg&#10;사진: https://example.com/news-02.jpg&#10;링크: 원문 기사 | https://example.com/article&#10;&#10;이번 주 소식 본문을 자유롭게 붙여넣으세요.&#10;- 포인트 1&#10;- 포인트 2"
            ></textarea>
          </label>

          <label>
            주보내용 원문 (예배순서/행사/광고를 그대로 붙여넣기)
            <textarea
              id="bulletinRaw"
              class="article-input"
              placeholder="날짜: 2026.04.23 (목)&#10;예배순서&#10;10:50 | 예배 준비 | 인도자&#10;11:00 | 찬양 | 찬양팀&#10;11:05 | 기도 | 대표기도자&#10;11:20 | 말씀 선포 | 담임목사&#10;&#10;행사 안내&#10;행사명: 교사 기도회&#10;일시: 2026.04.24(금) 20:00&#10;장소: 비전홀&#10;대상: 교사/교역자&#10;문의: 교육부장 010-0000-0000&#10;&#10;행사명: 청년 수련회&#10;일시: 2026.05.02(토)-05.03(주일)&#10;장소: 수양관&#10;대상: 청년부&#10;신청: 4월 25일까지"
            ></textarea>
          </label>
        </div>

        <div class="writer-actions">
          <button id="generate" type="button">자동 코드 생성</button>
          <button id="copy" type="button" class="secondary">코드 복사</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>2) 생성된 코드</h2>
          <p class="subtle">이 코드를 <code>content/weeks.js</code>의 <code>weeks</code> 맨 위에 붙여넣으세요.</p>
        </div>
        <pre id="snippet" class="snippet-box">아직 생성된 코드가 없습니다.</pre>
      </section>
    </main>

    <script src="./assets/writer.js"></script>
  </body>
</html>
